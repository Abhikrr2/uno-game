<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO Card Shuffling Animation Prototype</title>
  <style>
    /* Premium dark gradient background */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1e293b, #0f172a);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      color: #fff;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    /* 3D Scene setup */
    .scene {
      perspective: 1000px;
      width: 200px;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 50px;
    }

    .deck {
      position: relative;
      width: 150px;
      height: 220px;
      transform-style: preserve-3d;
      transform: rotateX(20deg) rotateY(-10deg);
      transition: transform 0.5s ease;
    }

    .deck:hover {
      transform: rotateX(25deg) rotateY(-5deg) scale(1.05);
    }

    /* Base card styling */
    .card {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      background: #1e293b;
      border: 3px solid #f8fafc;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: 1.2rem;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      /* Stacking cards slightly in Z space to form a physical deck look */
      transform: translateZ(calc(var(--card-index) * 2px)) rotate(calc(var(--card-index) * 0.5deg));
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Card back style - classic UNO red border + oval */
    .card-back {
      width: calc(100% - 16px);
      height: calc(100% - 16px);
      margin: 8px;
      border-radius: 10px;
      background: radial-gradient(circle, #dc2626 60%, #991b1b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fcd34d;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
      font-style: italic;
      font-size: 1.5rem;
      border: 2px solid #fcd34d;
      box-sizing: border-box;
    }

    /* Color variations for the back design just for visual variety when fanned */
    .card:nth-child(even) .card-back {
      background: radial-gradient(circle, #2563eb 60%, #1d4ed8);
    }
    .card:nth-child(3n) .card-back {
      background: radial-gradient(circle, #16a34a 60%, #15803d);
    }
    .card:nth-child(4n) .card-back {
      background: radial-gradient(circle, #ca8a04 60%, #a16207);
    }

    /* Custom shuffle animations */
    .shuffling .card {
      animation: shuffle-card-anim 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }

    /* Assign offset animation delays to cards so they shuffle sequentially */
    .shuffling .card:nth-child(1) { animation-delay: 0.0s; }
    .shuffling .card:nth-child(2) { animation-delay: 0.15s; }
    .shuffling .card:nth-child(3) { animation-delay: 0.3s; }
    .shuffling .card:nth-child(4) { animation-delay: 0.45s; }
    .shuffling .card:nth-child(5) { animation-delay: 0.6s; }
    .shuffling .card:nth-child(6) { animation-delay: 0.75s; }
    .shuffling .card:nth-child(7) { animation-delay: 0.9s; }
    .shuffling .card:nth-child(8) { animation-delay: 1.05s; }

    @keyframes shuffle-card-anim {
      0% {
        transform: translateZ(calc(var(--card-index) * 2px)) rotate(calc(var(--card-index) * 0.5deg));
      }
      25% {
        /* Fan out to left or right based on index */
        transform: 
          translateX(calc(var(--direction) * 140px)) 
          translateY(-10px)
          translateZ(50px) 
          rotateY(calc(var(--direction) * 35deg)) 
          rotate(calc(var(--card-index) * -2deg));
        z-index: 10;
      }
      50% {
        /* Interlace together */
        transform: 
          translateX(calc(var(--direction) * 20px)) 
          translateY(0)
          translateZ(20px) 
          rotateY(0) 
          rotate(0);
        z-index: var(--card-index);
      }
      75% {
        /* Push back and settle */
        transform: 
          translateX(0) 
          translateY(5px)
          translateZ(calc(var(--card-index) * 2px)) 
          rotate(calc(var(--card-index) * 0.5deg));
      }
      100% {
        transform: translateZ(calc(var(--card-index) * 2px)) rotate(calc(var(--card-index) * 0.5deg));
      }
    }

    /* Premium Button styling */
    .btn-shuffle {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      border: none;
      padding: 14px 40px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-shuffle:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(239, 68, 68, 0.6);
    }

    .btn-shuffle:active {
      transform: translateY(-1px);
    }

    .btn-shuffle.active {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
    }
  </style>
</head>
<body>

  <h1>UNO Card Shuffler</h1>
  <p>Interactive 3D shuffling physics simulation</p>

  <div class="scene">
    <div class="deck" id="deck">
      <!-- 8 Cards for the stack -->
      <div class="card" style="--card-index: 1; --direction: -1;"><div class="card-back">UNO</div></div>
      <div class="card" style="--card-index: 2; --direction: 1;"><div class="card-back">UNO</div></div>
      <div class="card" style="--card-index: 3; --direction: -1;"><div class="card-back">UNO</div></div>
      <div class="card" style="--card-index: 4; --direction: 1;"><div class="card-back">UNO</div></div>
      <div class="card" style="--card-index: 5; --direction: -1;"><div class="card-back">UNO</div></div>
      <div class="card" style="--card-index: 6; --direction: 1;"><div class="card-back">UNO</div></div>
      <div class="card" style="--card-index: 7; --direction: -1;"><div class="card-back">UNO</div></div>
      <div class="card" style="--card-index: 8; --direction: 1;"><div class="card-back">UNO</div></div>
    </div>
  </div>

  <button class="btn-shuffle" id="shuffleBtn">Shuffle Deck</button>

  <script>
    const deck = document.getElementById('deck');
    const shuffleBtn = document.getElementById('shuffleBtn');
    let isShuffling = false;

    shuffleBtn.addEventListener('click', () => {
      if (isShuffling) {
        // Stop shuffling
        deck.classList.remove('shuffling');
        shuffleBtn.classList.remove('active');
        shuffleBtn.textContent = 'Shuffle Deck';
        isShuffling = false;
      } else {
        // Start shuffling
        deck.classList.add('shuffling');
        shuffleBtn.classList.add('active');
        shuffleBtn.textContent = 'Stop Shuffle';
        isShuffling = true;
      }
    });
  </script>
</body>
</html>
